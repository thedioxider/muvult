services:
  muvult:
    build: .
    container_name: muvult
    restart: unless-stopped
    env_file: .env
    depends_on:
      - telegram-bot-api
    volumes:
      - /data/media/muvult:/music
      - /data/var/muvult:/data
      - staging:/staging
      # Shared with telegram-bot-api at the identical path so local-mode file
      # paths returned by get_file resolve inside this container.
      - bot-api-data:/var/lib/telegram-bot-api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: muvult-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TG_API_ID}
      TELEGRAM_API_HASH: ${TG_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api

  # Scratch reaper: the local Bot API server keeps its downloaded originals and
  # never prunes them, and staging can orphan files on a crashed import. Delete
  # anything older than a week from both scratch volumes, hourly. Only files
  # (-type f) so the server's per-token dir structure is left intact.
  cleaner:
    image: alpine:latest
    container_name: muvult-cleaner
    restart: unless-stopped
    volumes:
      - staging:/staging
      - bot-api-data:/var/lib/telegram-bot-api
    command: >
      sh -c 'while true; do
        find /staging /var/lib/telegram-bot-api -type f -mmin +10080 -delete;
        sleep 3600;
      done'

volumes:
  staging:
  bot-api-data:
